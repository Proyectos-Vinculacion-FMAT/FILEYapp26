name: Deploy prototipo EVT a GitHub Pages

# Publica SOLO la carpeta prototipo/EVT como sitio estático.
# El resto del repo (docs internos, actas, etc.) NO se expone en el sitio.

on:
  push:
    branches: [main]
    paths:
      - "prototipo/EVT/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Pages (intenta habilitarlo automáticamente)
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Subir solo prototipo/EVT como artefacto del sitio
        uses: actions/upload-pages-artifact@v3
        with:
          path: prototipo/EVT

      - name: Desplegar a GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
