name: Deploy backend-test

# Runs after code lands on backend-test (i.e. once a PR is merged into it).
on:
  push:
    branches: [backend-test]
  workflow_dispatch: {}   # allow manual re-deploys from the Actions tab

# Never let two deploys run at once against the same server.
concurrency:
  group: deploy-backend-test
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.TEST_SERVER_SSH_KEY }}
          SSH_PASSPHRASE: ${{ secrets.TEST_SERVER_SSH_KEY_PASSPHRASE }}
          SSH_HOST: ${{ secrets.TEST_SERVER_HOST }}
          SSH_USER: ${{ secrets.TEST_SERVER_USER }}
          SSH_PORT: ${{ secrets.TEST_SERVER_PORT }}
          DEPLOY_PATH: ${{ secrets.TEST_SERVER_DEPLOY_PATH }}
        run: |
          set -euo pipefail
          PORT="${SSH_PORT:-22}"

          # Load the private deploy key.
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          # Trust the server's host key (TOFU).
          ssh-keyscan -p "$PORT" -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          # Start an agent and add the (passphrase-protected) key. The passphrase
          # is supplied non-interactively via SSH_ASKPASS.
          eval "$(ssh-agent -s)"
          ASKPASS="$(mktemp)"
          printf '#!/usr/bin/env bash\necho "$SSH_PASSPHRASE"\n' > "$ASKPASS"
          chmod 700 "$ASKPASS"
          # SSH_ASKPASS_REQUIRE=force makes ssh-add use the askpass helper even
          # without a terminal (OpenSSH >= 8.4, present on ubuntu-latest).
          SSH_ASKPASS="$ASKPASS" SSH_ASKPASS_REQUIRE=force DISPLAY=:0 \
            ssh-add ~/.ssh/deploy_key
          rm -f "$ASKPASS"

          # Pull latest backend-test and (re)build the container on the server.
          # The key is served by the agent, so no -i is needed.
          ssh -p "$PORT" "$SSH_USER@$SSH_HOST" \
            "set -euo pipefail; \
             cd '$DEPLOY_PATH'; \
             git fetch --all --prune; \
             git checkout backend-test; \
             git reset --hard origin/backend-test; \
             docker compose up -d --build; \
             docker image prune -f"

          ssh-agent -k >/dev/null 2>&1 || true
